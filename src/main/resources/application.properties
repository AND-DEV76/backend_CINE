spring.application.name=cinemaroyale
server.port=${PORT:8080}

# Conexion a SQL Server
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=CinemaRoyale;encrypt=true;trustServerCertificate=true;sendTimeAsDatetime=false
spring.datasource.username=sa
spring.datasource.password=123456789
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# HikariCP - Pool de conexiones afinado para Render (instancia con recursos limitados)
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=8
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.pool-name=CinemaRoyalePool

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=never
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Logging - solo errores en produccion
logging.level.root=WARN
logging.level.com.cinemaroyale=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.web=WARN

# Seguridad temporal
spring.security.user.name=admin
spring.security.user.password=admin123

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Cloudinary (sobreescribe en application-local.properties)
cloudinary.cloud-name=TU_CLOUD_NAME
cloudinary.api-key=TU_API_KEY
cloudinary.api-secret=TU_API_SECRET

# Pasarela de pagos: mock (demo) o bank (produccion con API bancaria)
payment.gateway=mock
